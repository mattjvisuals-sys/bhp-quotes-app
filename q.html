<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote - Benny Hanson Productions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Helvetica Neue',sans-serif;background:#060606;color:#eae6dd;min-height:100vh}
:root{--gold:#d4a438;--gold-dim:#8a7535;--bg:#060606;--surface:#111;--border:#1e1e1e;--text:#eae6dd;--dim:#777}
/* Quote view */
.quote-bg{background:#f0ede6;min-height:100vh}
.quote-bar{background:var(--bg);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.quote-bar button{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.quote-bar .print{background:var(--gold);color:#0a0a0a;border:none;font-weight:600}
.quote-doc{background:#fff;border-radius:3px;overflow:hidden;box-shadow:0 2px 24px rgba(0,0,0,.07);max-width:780px;margin:28px auto;padding:0}
.q-header{background:var(--bg);color:#fff;padding:14px 44px 12px;display:flex;justify-content:space-between;align-items:center}
.q-header .q-title{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:700;color:var(--gold);margin:0}
.q-header .q-num,.q-header .q-date{font-size:13px;color:#999;margin:3px 0 0}
.q-info-bar{display:flex;border-bottom:1px solid #e8e4de}
.q-info-cell{flex:1;padding:16px 44px}
.q-info-cell.bordered{border-left:1px solid #e8e4de}
.q-info-cell .ic-label{font-size:9px;letter-spacing:2px;color:#aaa;font-weight:600}
.q-info-cell .ic-value{margin:5px 0 0;font-size:15px;font-weight:600;color:#1a1a1a}
.q-stats{padding:14px 44px;background:#faf8f4;border-bottom:1px solid #e8e4de;display:flex;gap:28px;flex-wrap:wrap}
.q-stat .qs-label{font-size:9px;letter-spacing:1px;color:#aaa;font-weight:600}
.q-stat .qs-value{margin:3px 0 0;font-size:13px;font-weight:600;color:#1a1a1a}
.q-items{padding:28px 44px}
.q-cat-header{display:flex;justify-content:space-between;border-bottom:2px solid #1a1a1a;padding-bottom:5px;margin-bottom:6px}
.q-cat-header span{font-size:10px;font-weight:700;letter-spacing:2px;color:#1a1a1a}
.q-line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0ece4;font-size:13px;color:#444}
.q-line .q-amt{font-weight:500;color:#1a1a1a;white-space:nowrap;margin-left:16px}
.q-cat-sub{display:flex;justify-content:flex-end;padding-top:5px}
.q-cat-sub span{font-size:12px;font-weight:600;color:#999}
.q-totals{border-top:2px solid #1a1a1a;margin-top:14px;padding-top:14px}
.q-total-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:#666}
.q-total-row .q-tr-val{font-weight:500}
.q-grand{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:2px solid var(--gold)}
.q-grand span{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:800}
.q-grand .q-g-label{color:#1a1a1a}
.q-grand .q-g-val{color:var(--gold)}
.q-notes{padding:0 44px 28px}
.q-notes .qn-label{font-size:10px;letter-spacing:2px;color:#aaa;font-weight:600;margin:0 0 6px}
.q-notes .qn-text{font-size:12px;color:#666;line-height:1.6;white-space:pre-wrap}
.q-footer{background:var(--bg);padding:20px 44px;display:flex;justify-content:space-between;align-items:center}
.q-footer .qf-valid{font-size:11px;color:#555}
.page-break{page-break-before:always;break-before:page}
@media print{@page{margin:0.4in}body{background:#f0ede6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.quote-bar{display:none!important}.quote-doc{box-shadow:none!important;margin:0!important}}
@media(max-width:600px){
.q-header{flex-direction:column;text-align:center;gap:10px;padding:14px 20px}
.q-header div:last-child{text-align:center}
.q-info-bar{flex-direction:column}
.q-info-cell{padding:12px 20px}
.q-info-cell.bordered{border-left:none;border-top:1px solid #e8e4de}
.q-items{padding:20px 20px}
.q-stats{padding:12px 20px}
.q-totals{margin:0 20px!important}
.q-notes{padding:0 20px 20px}
.q-footer{padding:16px 20px;flex-direction:column;gap:8px;text-align:center}
.quote-bar{flex-direction:column;gap:8px;padding:10px 14px}
.quote-bar button{width:100%}
}
.pay-section{background:#fff;border-radius:3px;box-shadow:0 2px 24px rgba(0,0,0,.07);padding:32px 44px;text-align:center}
.pay-section h3{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;color:#1a1a1a;margin:0 0 6px}
.pay-section p{font-size:13px;color:#777;margin:0 0 20px}
.pay-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.pay-btn{padding:14px 32px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s}
.pay-btn:disabled{opacity:.5;cursor:not-allowed}
.pay-btn.deposit{background:#d4a438;color:#0a0a0a}
.pay-btn.balance{background:#1a1a1a;color:#eae6dd}
.pay-btn:hover:not(:disabled){opacity:.85}
.pay-msg{margin-top:16px;font-size:13px;padding:10px 16px;border-radius:6px;display:none}
.pay-msg.success{display:block;background:rgba(46,204,113,.12);color:#27ae60}
.pay-msg.cancelled{display:block;background:rgba(212,164,56,.12);color:#b8942e}
.pay-divider{display:flex;align-items:center;gap:16px;margin:20px 0;color:#aaa;font-size:12px;letter-spacing:1px}
.pay-divider::before,.pay-divider::after{content:'';flex:1;border-top:1px solid #ddd}
.paypal-container{min-height:45px}
@media(max-width:600px){.pay-section{padding:24px 20px}.pay-buttons{flex-direction:column}.pay-btn{width:100%}}
</style>
</head>

function fmt(n){return "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(s){var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML;}

function renderQuote(row){
  var d=row.quote_data;
  var client=esc(row.client_name||"-");
  var project=esc(row.project_name||"-");
  var loc=esc(row.shoot_location||"-");
  var qn=row.quote_number||"";
  var qd=row.quote_date||"";
  var notes=(row.form_state&&row.form_state.inputs&&row.form_state.inputs.notes)||"";
  var feeIncluded=row.fee_included;
  var dateStr="";
  try{dateStr=new Date(qd+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});}catch(e){dateStr=qd;}
  var crewCount=0;
  if(row.form_state&&row.form_state.crew){crewCount=row.form_state.crew.filter(function(c){return c.on}).length;}

  var showFee=feeIncluded&&d.svcFee>0;
  var total=showFee?d.total:d.total-d.svcFee;
  var balance=showFee?d.balance:d.balance-d.svcFee;
  var deposit=d.deposit;

  var cats=[
    {cat:"KIT FEES & EQUIPMENT",sub:d.equipTotal,items:d.equipItems},
    {cat:"TRAVEL & LOGISTICS",sub:d.travelTotal,items:d.travelItems},
    {cat:"CREW & LABOR",sub:d.crewTotal,items:d.crewItems}
  ];

  var html='<div class="q-header"><div><img src="'+BHP_LOGO+'" alt="Benny Hanson Productions" style="height:120px;margin:0 0 2px">';
  html+='<p style="margin:4px 0 0;font-size:11px;color:#777">7100 Cerritos Ave</p><p style="font-size:11px;color:#777;margin:0">Stanton, CA 90680</p></div>';
  html+='<div style="text-align:right"><p class="q-title">QUOTE</p><p class="q-num">'+esc(qn)+'</p><p class="q-date">'+dateStr+'</p></div></div>';
  html+='<div class="q-info-bar"><div class="q-info-cell"><p class="ic-label">PREPARED FOR</p><p class="ic-value">'+client+'</p></div>';
  html+='<div class="q-info-cell bordered"><p class="ic-label">PROJECT</p><p class="ic-value">'+project+'</p></div>';
  html+='<div class="q-info-cell bordered"><p class="ic-label">LOCATION</p><p class="ic-value">'+loc+'</p></div></div>';
  html+='<div class="q-stats"><div class="q-stat"><p class="qs-label">SHOOT DAYS</p><p class="qs-value">'+d.shootDays+'</p></div>';
  html+='<div class="q-stat"><p class="qs-label">CREW SIZE</p><p class="qs-value">'+crewCount+' Members</p></div></div>';
  html+='<div class="q-items">';
  for(var ci=0;ci<cats.length;ci++){
    var cat=cats[ci];
    html+='<div style="margin-bottom:22px"><div class="q-cat-header"><span>'+cat.cat+'</span><span>AMOUNT</span></div>';
    for(var j=0;j<cat.items.length;j++){
      html+='<div class="q-line"><span>'+cat.items[j].d+'</span><span class="q-amt">'+fmt(cat.items[j].a)+'</span></div>';
    }
    html+='<div class="q-cat-sub"><span>'+fmt(cat.sub)+'</span></div></div>';
  }

  html+='<div class="q-totals" style="margin:0 44px;"><div class="q-total-row"><span>Subtotal</span><span class="q-tr-val">'+fmt(d.sub)+'</span></div>';
  html+='<div class="q-total-row"><span>Production Fee ('+d.mkp+'%)</span><span class="q-tr-val">'+fmt(d.fee)+'</span></div>';
  if(showFee){html+='<div class="q-total-row"><span>Production Processing Fee</span><span class="q-tr-val">'+fmt(d.svcFee)+'</span></div>';}
  if(d.manualAdj!==0)html+='<div class="q-total-row"><span>Adjustment</span><span class="q-tr-val">'+fmt(d.manualAdj)+'</span></div>';
  html+='<div class="q-grand"><span class="q-g-label">TOTAL</span><span class="q-g-val">'+fmt(total)+'</span></div>';
  html+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid #e0dcd4">';

function printQuote(){
  var el=document.getElementById("quoteDoc");
  var w=window.open("","_blank");
  w.document.write("<html><head><title>Quote</title><link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap' rel='stylesheet'><style>"+document.querySelector("style").textContent+"</style></head><body><div style='max-width:780px;margin:20px auto'>"+el.outerHTML+"</div></body></html>");
  w.document.close();
  setTimeout(function(){w.print()},600);
}

async function handlePay(type){
  var btn=document.getElementById(type==='deposit'?'payDepositBtn':'payBalanceBtn');
  btn.disabled=true;btn.textContent='Redirecting to Stripe...';
  try{
    var id=new URLSearchParams(window.location.search).get('id');
    if(!id){var m=window.location.pathname.match(/\/q\/([A-Za-z0-9]+)/);if(m)id=m[1];}
    var r=await fetch('/api/checkout',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({quoteId:id,paymentType:type})
    });
    var data=await r.json();
    if(data.url){window.location.href=data.url;}
    else{throw new Error(data.error||'Failed to create checkout');}
  }catch(e){
    btn.disabled=false;
    btn.textContent=type==='deposit'?'Pay Deposit':'Pay Balance';
    var msg=document.getElementById('payMsg');
    msg.className='pay-msg cancelled';
    msg.textContent=e.message||'Something went wrong. Please try again.';
  }
}

function initPayPalButtons(quoteId,types){
  // Load PayPal SDK dynamically
  fetch('/api/paypal-create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quoteId:quoteId,paymentType:'deposit'})})
    .then(function(){})
    .catch(function(){});
  // We load the SDK using a meta endpoint — for now, use env-injected client ID from the page
  types.forEach(function(type){
    var containerId='paypal-btn-'+type;
    var container=document.getElementById(containerId);
    if(!container||!window.paypal)return;
    paypal.Buttons({
      style:{layout:'horizontal',color:'gold',shape:'rect',label:'paypal',height:45},
      createOrder:function(){
        return fetch('/api/paypal-create',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({quoteId:quoteId,paymentType:type})
        }).then(function(r){return r.json();}).then(function(data){
          if(data.error)throw new Error(data.error);
          return data.orderId;
        });
      },
      onApprove:function(data){
        return fetch('/api/paypal-capture',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({orderId:data.orderID,quoteId:quoteId,paymentType:type})
        }).then(function(r){return r.json();}).then(function(result){
          if(result.ok){
            var msg=document.getElementById('payMsg');
            msg.className='pay-msg success';
            msg.textContent=type==='deposit'?'Deposit payment received via PayPal! Thank you.':'Payment received in full via PayPal! Thank you.';
            if(type==='deposit'&&document.getElementById('payDepositBtn'))document.getElementById('payDepositBtn').style.display='none';
            if(type==='balance'&&document.getElementById('payBalanceBtn'))document.getElementById('payBalanceBtn').style.display='none';
            container.style.display='none';
            var otherContainer=document.getElementById('paypal-btn-'+(type==='deposit'?'deposit':'balance'));
            if(type==='deposit'&&otherContainer)otherContainer.style.display='none';
          }else{
            throw new Error(result.error||'Payment failed');
          }
        });
      },
      onError:function(err){
        var msg=document.getElementById('payMsg');
        msg.className='pay-msg cancelled';
        msg.textContent=err.message||'PayPal payment failed. Please try again.';
      },
      onCancel:function(){
        var msg=document.getElementById('payMsg');
        msg.className='pay-msg cancelled';
        msg.textContent='PayPal payment was cancelled. You can try again when ready.';
      }
    }).render('#'+containerId);
  });
}
